<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Item - Bid Market</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div id="main-nav"></div>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title mb-4">Add Auction Item</h2>
          <div id="alert"></div>
          <form id="addItemForm">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input required type="text" id="title" class="form-control">
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea required id="description" class="form-control" rows="4"></textarea>
            </div>
            <div class="mb-3">
              <label for="startingPrice" class="form-label">Starting Price (USD)</label>
              <input required type="number" step="0.01" id="startingPrice" class="form-control">
            </div>
            <div class="mb-3">
              <label for="auctionEndTime" class="form-label">Auction End Time</label>
              <input required type="datetime-local" id="auctionEndTime" class="form-control">
            </div>
            <div class="mb-3">
              <label for="imageUrl" class="form-label">Image URL</label>
              <input type="url" id="imageUrl" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Item</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  const form = document.getElementById('addItemForm');
  const alertEl = document.getElementById('alert');

  form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const payload = {
      title: document.getElementById('title').value,
      description: document.getElementById('description').value,
      startingPrice: parseFloat(document.getElementById('startingPrice').value),
      auctionEndTime: document.getElementById('auctionEndTime').value,
      imageUrl: document.getElementById('imageUrl').value
    };

    try {
      await apiRequest('/items', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      window.location.href = '/';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
  });
</script>
</body>
</html>
