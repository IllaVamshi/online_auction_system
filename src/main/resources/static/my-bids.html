<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bid Market - My Bids</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="main-nav"></div>
<div class="d-flex">
  <!-- Main Content -->
  <div class="flex-grow-1">
    <div class="container py-4">
      <div class="page-header mb-4">
        <div>
          <div class="page-header-title"><i class="fas fa-bullseye me-2"></i>My Bids</div>
          <div class="page-header-subtitle">Review and manage every auction you have bid on.</div>
        </div>
      </div>
      <div id="bids" class="row gy-4"></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  function renderBid(bid) {
    return `
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">${bid.auctionTitle || 'Auction'}</h5>
            <p class="mb-1"><strong>Your Bid:</strong> ${formatCurrency(bid.amount)}</p>
            <p class="mb-1"><strong>Bid Time:</strong> ${formatDateTime(bid.bidTime)}</p>
            <a href="/auction-detail.html?id=${bid.auctionId}" class="btn btn-primary">View Auction</a>
          </div>
        </div>
      </div>
    `;
  }

  function loadMyBids() {
    apiRequest('/bids/my')
      .then(bids => {
        const container = document.getElementById('bids');
        if (bids.length === 0) {
          container.innerHTML = '<div class="col-12"><div class="alert alert-info">You haven\'t placed any bids yet.</div></div>';
        } else {
          container.innerHTML = bids.map(renderBid).join('');
        }
      })
      .catch(err => {
        document.getElementById('bids').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      });
  }

  loadMyBids();
</script>
