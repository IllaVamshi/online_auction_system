<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auction Result - Bid Market</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div id="main-nav"></div>
<div class="container py-5">
  <div id="result"></div>
</div>
<script src="/js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const itemId = params.get('id');

  async function loadResult() {
    try {
      const item = await apiRequest(`/items/${itemId}`);
      const winnerName = item.winnerName || 'No winner yet';
      const winningBid = item.winningBidAmount ? formatCurrency(item.winningBidAmount) : '-';
      document.getElementById('result').innerHTML = `
        <div class="card">
          <div class="card-header">
            <h3>Auction Result</h3>
          </div>
          <div class="card-body">
            <p><strong>Item:</strong> ${item.title}</p>
            <p><strong>Winner:</strong> ${winnerName}</p>
            <p><strong>Winning Bid:</strong> ${winningBid}</p>
            <p><strong>Auction Closed:</strong> ${item.closed ? 'Yes' : 'No'}</p>
          </div>
        </div>
      `;
    } catch (err) {
      document.getElementById('result').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
  }

  if (!itemId) {
    document.getElementById('result').innerHTML = '<div class="alert alert-danger">No item specified.</div>';
  } else {
    loadResult();
  }
</script>
</body>
</html>
