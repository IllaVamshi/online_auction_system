<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bid Market - My Auctions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="main-nav"></div>
<div class="d-flex">
  <!-- Main Content -->
  <div class="flex-grow-1">
    <div class="container py-4">
      <div class="page-header mb-4">
        <div>
          <div class="page-header-title"><i class="fas fa-dollar-sign me-2"></i>My Auctions</div>
          <div class="page-header-subtitle">Track the performance of items you are selling.</div>
        </div>
      </div>
      <div id="auctions" class="row gy-4"></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  function renderAuction(auction) {
    const now = new Date();
    const ended = auction.endTime ? new Date(auction.endTime) <= now : false;
    return `
      <div class="col-md-4">
        <div class="card h-100">
          <img src="${auction.imageUrl || 'https://via.placeholder.com/400x240?text=No+Image'}" class="card-img-top" alt="${auction.title}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${auction.title}</h5>
            <p class="card-text text-truncate">${auction.description || ''}</p>
            <p class="mb-1"><strong>Current Bid:</strong> ${auction.currentPrice ? formatCurrency(auction.currentPrice) : formatCurrency(auction.startingPrice)}</p>
            <p class="mb-1"><strong>Ends:</strong> ${formatDateTime(auction.endTime)}</p>
            <p class="mb-3"><strong>Status:</strong> ${ended ? '<span class="badge bg-secondary">Closed</span>' : '<span class="badge bg-success">Open</span>'}</p>
            <a href="/auction-detail.html?id=${auction.id}" class="mt-auto btn btn-primary">View</a>
          </div>
        </div>
      </div>
    `;
  }

  function loadMyAuctions() {
    apiRequest('/auctions/my')
      .then(auctions => {
        const container = document.getElementById('auctions');
        if (auctions.length === 0) {
          container.innerHTML = '<div class="col-12"><div class="alert alert-info">You haven\'t created any auctions yet.</div></div>';
        } else {
          container.innerHTML = auctions.map(renderAuction).join('');
        }
      })
      .catch(err => {
        document.getElementById('auctions').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      });
  }

  loadMyAuctions();
</script>
