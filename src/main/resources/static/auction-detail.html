<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bid Market - Auction Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div id="main-nav"></div>
<div class="container py-4">
  <div id="auction-details"></div>
  <div id="bid-section" class="mt-4" style="display: none;">
    <div class="bid-form">
      <h4>Place Your Bid</h4>
      <form id="bidForm">
        <div class="bid-input">
          <input type="number" class="form-control" id="bidAmount" step="0.01" min="0" placeholder="Enter bid amount" required>
          <button type="submit" class="btn btn-success">Place Bid</button>
        </div>
      </form>
    </div>
  </div>
  <div id="bids-list" class="mt-4"></div>
  <div id="message" class="mt-3"></div>
</div>
<script src="/js/app.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const auctionId = urlParams.get('id');
  let currentAuction = null;

  function renderAuctionDetails(auction) {
    const now = new Date();
    const ended = auction.endTime ? new Date(auction.endTime) <= now : false;
    const isClosed = auction.closed === true;
    const auctionEnded = ended || isClosed;
    const canBid = !auctionEnded && isLoggedIn();
    
    let winnerInfo = '';
    let statusBadge = auctionEnded ? '<span class="badge bg-secondary">Closed</span>' : '<span class="badge bg-success">Open</span>';
    
    if (auctionEnded) {
      if (auction.winnerName) {
        winnerInfo = `<p><strong>Winner:</strong> ${auction.winnerName}</p>`;
        winnerInfo += `<p><strong>Winning Bid:</strong> ${auction.currentPrice ? formatCurrency(auction.currentPrice) : formatCurrency(auction.startingPrice)}</p>`;
        winnerInfo += `<div class="alert alert-success mt-2" id="winnerBanner"><strong>Auction Closed.</strong> Winner has been determined.</div>`;
      } else {
        winnerInfo = `<div class="alert alert-info mt-2"><strong>Auction Closed.</strong> No bids placed.</div>`;
      }
    }
    
    return `
      <div class="row">
        <div class="col-md-6">
          <img src="${auction.imageUrl || 'https://via.placeholder.com/600x400?text=No+Image'}" class="img-fluid" alt="${auction.title}">
        </div>
        <div class="col-md-6">
          <h1>${auction.title}</h1>
          <p class="lead">${auction.description || ''}</p>
          <p><strong>Starting Price:</strong> ${formatCurrency(auction.startingPrice)}</p>
          <p><strong>Current Bid:</strong> ${auction.currentPrice ? formatCurrency(auction.currentPrice) : formatCurrency(auction.startingPrice)}</p>
          <p><strong>End Time:</strong> ${formatDateTime(auction.endTime)}</p>
          <p><strong>Status:</strong> ${statusBadge}</p>
          <p><strong>Created by:</strong> ${auction.createdByName || 'Unknown'}</p>
          ${winnerInfo}
        </div>
      </div>
    `;
  }

  function renderBids(bids) {
    if (bids.length === 0) {
      return '<h4>Bids</h4><p>No bids yet.</p>';
    }
    const bidsHtml = bids.map(bid => `
      <div class="card mb-2">
        <div class="card-body">
          <p class="mb-1"><strong>${bid.bidderName}:</strong> ${formatCurrency(bid.amount)}</p>
          <small class="text-muted">${formatDateTime(bid.bidTime)}</small>
        </div>
      </div>
    `).join('');
    return `<h4>Bids</h4>${bidsHtml}`;
  }

  function loadAuction() {
    if (!auctionId) {
      document.getElementById('auction-details').innerHTML = '<div class="alert alert-danger">No auction ID provided.</div>';
      return;
    }

    apiRequest(`/auctions/${auctionId}`)
      .then(auction => {
        currentAuction = auction;
        document.getElementById('auction-details').innerHTML = renderAuctionDetails(auction);
        const now = new Date();
        const ended = auction.endTime ? new Date(auction.endTime) <= now : false;
        const isClosed = auction.closed === true;
        const auctionEnded = ended || isClosed;
        if (!auctionEnded && isLoggedIn()) {
          document.getElementById('bid-section').style.display = 'block';
          document.getElementById('bidAmount').min = auction.currentPrice || auction.startingPrice;
        }

        // Winner notification for the logged-in winner
        if (auctionEnded && auction.winnerId && isLoggedIn()) {
          apiRequest('/users/profile')
            .then(me => {
              if (me && me.id && String(me.id) === String(auction.winnerId)) {
                const banner = document.getElementById('winnerBanner');
                if (banner) {
                  banner.innerHTML = '<strong>You won this auction.</strong> Congratulations!';
                  banner.classList.remove('alert-success');
                  banner.classList.add('alert-info');
                }
              }
            })
            .catch(() => {});
        }
      })
      .catch(err => {
        document.getElementById('auction-details').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      });

    apiRequest(`/auctions/${auctionId}/bids`)
      .then(bids => {
        document.getElementById('bids-list').innerHTML = renderBids(bids);
      })
      .catch(err => {
        document.getElementById('bids-list').innerHTML = `<div class="alert alert-danger">Failed to load bids: ${err.message}</div>`;
      });
  }

  document.getElementById('bidForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const amount = parseFloat(document.getElementById('bidAmount').value);
    apiRequest('/bids/place', {
      method: 'POST',
      body: JSON.stringify({ auctionId: parseInt(auctionId), amount })
    })
    .then(() => {
      document.getElementById('message').innerHTML = '<div class="alert alert-success">Bid placed successfully!</div>';
      loadAuction(); // Reload to update current bid
    })
    .catch(err => {
      document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    });
  });

  loadAuction();
</script>
