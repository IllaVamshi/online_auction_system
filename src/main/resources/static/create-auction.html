<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bid Market - Create Auction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="main-nav"></div>
<div class="d-flex">
  <!-- Main Content -->
  <div class="flex-grow-1">
    <div class="container py-4">
      <div class="page-header mb-4">
        <div>
          <div class="page-header-title"><i class="fas fa-pen-nib me-2"></i>Create New Auction</div>
          <div class="page-header-subtitle">List a new item and start attracting bidders in minutes.</div>
        </div>
      </div>
      <form id="auctionForm" class="row g-3">
        <div class="col-12">
          <div class="form-floating">
            <input type="text" class="form-control" id="title" placeholder="Auction Title" required>
            <label for="title">Title</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="number" class="form-control" id="startingPrice" step="0.01" min="0" placeholder="0.00" required>
            <label for="startingPrice">Starting Price ($)</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <textarea class="form-control" id="description" rows="3" placeholder="Describe your item"></textarea>
            <label for="description">Description</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="datetime-local" class="form-control" id="endTime" required>
            <label for="endTime">End Time</label>
          </div>
          <div class="form-text" id="endTimeDisplay">Please choose an end date and time.</div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="url" class="form-control" id="imageUrl" placeholder="https://example.com/image.jpg">
            <label for="imageUrl">Image URL (optional)</label>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Upload Image (optional)</label>
          <input class="form-control" type="file" id="imageFile" accept="image/*">
          <div class="form-text">If you upload an image, it will be used instead of the Image URL.</div>
          <div class="mt-3 d-none" id="imagePreviewWrap">
            <img id="imagePreview" class="img-fluid rounded-3 border" style="max-height: 220px;" alt="Preview">
          </div>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-success">Create Auction</button>
        </div>
      </form>
      <div id="message" class="mt-3"></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  const imageFileInput = document.getElementById('imageFile');
  const imagePreviewWrap = document.getElementById('imagePreviewWrap');
  const imagePreview = document.getElementById('imagePreview');
  const endTimeInput = document.getElementById('endTime');
  const endTimeDisplay = document.getElementById('endTimeDisplay');

  imageFileInput.addEventListener('change', () => {
    const file = imageFileInput.files && imageFileInput.files[0];
    if (!file) {
      imagePreviewWrap.classList.add('d-none');
      imagePreview.src = '';
      return;
    }
    const url = URL.createObjectURL(file);
    imagePreview.src = url;
    imagePreviewWrap.classList.remove('d-none');
  });

  endTimeInput.addEventListener('change', () => {
    const value = endTimeInput.value;
    if (!value) {
      endTimeDisplay.textContent = 'Please choose an end date and time.';
      return;
    }
    const dt = new Date(value);
    if (isNaN(dt.getTime())) {
      endTimeDisplay.textContent = 'Invalid date/time selected.';
      return;
    }
    endTimeDisplay.textContent = 'Selected end time: ' + dt.toLocaleString();
  });

  async function uploadImageIfNeeded() {
    const file = imageFileInput.files && imageFileInput.files[0];
    if (!file) return null;
    const fd = new FormData();
    fd.append('file', file);
    const resp = await apiRequest('/uploads', { method: 'POST', body: fd });
    return resp && resp.url ? resp.url : null;
  }

  document.getElementById('auctionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!isLoggedIn()) {
      document.getElementById('message').innerHTML = '<div class="alert alert-danger">You must be logged in to create an auction.</div>';
      return;
    }
    
    const title = document.getElementById('title').value.trim();
    const startingPrice = parseFloat(document.getElementById('startingPrice').value);
    const endTime = document.getElementById('endTime').value;
    
    // Client-side validation
    if (!title) {
      document.getElementById('message').innerHTML = '<div class="alert alert-danger">Title is required.</div>';
      return;
    }
    if (isNaN(startingPrice) || startingPrice <= 0) {
      document.getElementById('message').innerHTML = '<div class="alert alert-danger">Starting price must be a positive number.</div>';
      return;
    }
    if (!endTime) {
      document.getElementById('message').innerHTML = '<div class="alert alert-danger">End time is required.</div>';
      return;
    }
    const endDate = new Date(endTime);
    if (endDate <= new Date()) {
      document.getElementById('message').innerHTML = '<div class="alert alert-danger">End time must be in the future.</div>';
      return;
    }
    
    const uploadedUrl = await uploadImageIfNeeded();
    const formData = {
      title: title,
      description: document.getElementById('description').value.trim(),
      startingPrice: startingPrice,
      endTime: endTime,
      imageUrl: uploadedUrl || document.getElementById('imageUrl').value.trim()
    };

    try {
      await apiRequest('/auctions', { method: 'POST', body: JSON.stringify(formData) });
      document.getElementById('message').innerHTML = '<div class="alert alert-success">Auction created successfully! Redirecting...</div>';
      window.location.href = '/dashboard.html';
    } catch (err) {
      document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
  });
</script>
