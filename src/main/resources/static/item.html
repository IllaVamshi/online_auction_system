<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Item Detail - Bid Market</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div id="main-nav"></div>
<div class="container py-5">
  <div id="content"></div>
</div>
<script src="/js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const itemId = params.get('id');

  function renderItem(item, bids, highestBid) {
    const ended = item.auctionEndTime ? new Date(item.auctionEndTime) <= new Date() : false;
    const currentBid = highestBid ? formatCurrency(highestBid.amount) : formatCurrency(item.startingPrice);

    const bidForm = `
      <div class="card mt-4">
        <div class="card-header">Place a Bid</div>
        <div class="card-body">
          <form id="bidForm">
            <div class="mb-3">
              <label for="amount" class="form-label">Bid Amount (USD)</label>
              <input required type="number" step="0.01" min="0" id="amount" class="form-control" value="${item.startingPrice}">
            </div>
            <button type="submit" class="btn btn-success">Place Bid</button>
          </form>
        </div>
      </div>
    `;

    const bidsHtml = bids.length ? bids.map(b => `
      <tr>
        <td>${b.bidderName || 'Unknown'}</td>
        <td>${formatCurrency(b.amount)}</td>
        <td>${formatDateTime(b.bidTime)}</td>
      </tr>
    `).join('') : '<tr><td colspan="3">No bids yet</td></tr>';

    document.getElementById('content').innerHTML = `
      <div class="row">
        <div class="col-lg-6">
          <div class="card mb-4">
            <img src="${item.imageUrl || 'https://via.placeholder.com/600x400?text=No+Image'}" class="card-img-top" alt="${item.title}">
            <div class="card-body">
              <h3 class="card-title">${item.title}</h3>
              <p class="card-text">${item.description || ''}</p>
              <p><strong>Seller:</strong> ${item.sellerName || 'N/A'}</p>
              <p><strong>Ends:</strong> ${formatDateTime(item.auctionEndTime)}</p>
              <p><strong>Current Bid:</strong> ${currentBid}</p>
              <p><strong>Status:</strong> ${ended ? '<span class="badge bg-secondary">Closed</span>' : '<span class="badge bg-success">Open</span>'}</p>
              ${ended && item.winnerName ? `<p><strong>Winner:</strong> ${item.winnerName}</p>` : ''}
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header">Bid History</div>
            <div class="card-body p-0">
              <table class="table mb-0">
                <thead>
                  <tr>
                    <th>Bidder</th>
                    <th>Amount</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody>${bidsHtml}</tbody>
              </table>
            </div>
          </div>
          ${ended ? '' : bidForm}
        </div>
      </div>
    `;

    const bidFormElement = document.getElementById('bidForm');
    if (bidFormElement) {
      bidFormElement.addEventListener('submit', async (event) => {
        event.preventDefault();
        const amount = parseFloat(document.getElementById('amount').value);
        try {
          await apiRequest(`/bids/place?itemId=${item.id}&amount=${amount}`, { method: 'POST' });
          await loadItem();
        } catch (err) {
          alert(err.message);
        }
      });
    }
  }

  async function loadItem() {
    try {
      const item = await apiRequest(`/items/${itemId}`);
      const bids = await apiRequest(`/items/${itemId}/bids`);
      const highestBid = await apiRequest(`/items/${itemId}/highest-bid`);
      renderItem(item, bids, highestBid);
    } catch (err) {
      document.getElementById('content').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
  }

  if (!itemId) {
    document.getElementById('content').innerHTML = '<div class="alert alert-danger">No item specified.</div>';
  } else {
    loadItem();
  }
</script>
</body>
</html>
