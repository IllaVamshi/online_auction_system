<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bid Market - Auctions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="main-nav"></div>
<div class="d-flex">
  <!-- Main Content -->
  <div class="flex-grow-1">
    <div class="container py-4">
      <div class="page-header mb-4">
        <div>
          <div class="page-header-title"><i class="fas fa-list-alt me-2"></i>All Auctions</div>
          <div class="page-header-subtitle">Browse every live auction and find your next winning bid.</div>
        </div>
      </div>
      <div id="auctions" class="row gy-4"></div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  function renderAuction(auction) {
    const now = new Date();
    const endedByTime = auction.endTime ? new Date(auction.endTime) <= now : false;
    const closedFlag = auction.closed === true;
    const auctionEnded = endedByTime || closedFlag;
    const remainingTime = auctionEnded ? 'Ended' : formatTimeRemaining(auction.endTime);
    const statusClass = auctionEnded ? 'ended' : 'active';
    const statusText = auctionEnded ? 'Closed' : 'Active';

    let winnerLine = '';
    if (auctionEnded) {
      if (auction.winnerName) {
        const winAmount = auction.currentPrice ? formatCurrency(auction.currentPrice) : formatCurrency(auction.startingPrice);
        winnerLine = `<p class="mb-1"><strong>Winner:</strong> ${auction.winnerName} (${winAmount})</p>`;
      } else {
        winnerLine = `<p class="mb-1"><strong>Winner:</strong> No bids placed</p>`;
      }
    }
    return `
      <div class="col-md-4 fade-in-up">
        <div class="card h-100 auction-card">
          <div class="auction-status ${statusClass}">${statusText}</div>
          <img src="${auction.imageUrl || 'https://via.placeholder.com/400x240?text=No+Image'}" class="card-img-top" alt="${auction.title}">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${auction.title}</h5>
            <p class="card-text text-truncate">${auction.description || ''}</p>
            <p class="mb-1"><strong>Current Bid:</strong> ${auction.currentPrice ? formatCurrency(auction.currentPrice) : formatCurrency(auction.startingPrice)}</p>
            <p class="mb-1"><strong>Time Left:</strong> ${remainingTime}</p>
            ${winnerLine}
            <a href="/auction-detail.html?id=${auction.id}" class="mt-auto btn btn-primary">View Details</a>
          </div>
        </div>
      </div>
    `;
  }

  function loadAuctions() {
    apiRequest('/auctions')
      .then(auctions => {
        const container = document.getElementById('auctions');
        if (!auctions || auctions.length === 0) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-info text-center">No auctions available</div></div>`;
            return;
        }
        container.innerHTML = auctions.map(renderAuction).join('');
      })
      .catch(err => {
        document.getElementById('auctions').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      });
  }

  loadAuctions();
</script>
