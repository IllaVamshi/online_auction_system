<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Bid Market</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="main-nav"></div>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm fade-in-up">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="fas fa-gavel fa-3x text-primary mb-3"></i>
            <h2 class="card-title mb-2">Welcome Back</h2>
            <p class="text-muted">Sign in to your account</p>
          </div>
          <div id="alert"></div>
          <form id="loginForm">
            <div class="form-floating mb-3">
              <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
              <label for="email"><i class="fas fa-envelope me-2"></i>Email address</label>
            </div>
            <div class="form-floating mb-4">
              <input type="password" id="password" class="form-control" placeholder="Password" required>
              <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">
              <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
          </form>
          <div class="text-center">
            <small class="text-muted">Don't have an account?
              <a href="/register.html" class="text-primary text-decoration-none fw-bold">Register here</a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  const loginForm = document.getElementById('loginForm');
  const alertEl = document.getElementById('alert');

  loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Show loading state
    const submitBtn = loginForm.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
    submitBtn.disabled = true;

    try {
      const response = await apiRequest('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      setToken(response.token);
      alertEl.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>${response.message}</div>`;
      window.location.href = '/dashboard.html';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i>${err.message || 'Login failed. Please check your credentials.'}</div>`;
    } finally {
      submitBtn.innerHTML = originalText;
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
